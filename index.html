<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discoteca - Teste</title>
<style>
  body{background:#1B1815;color:#EDE8DC;font-family:sans-serif;padding:20px;}
  .card{background:#242019;padding:12px;margin:8px 0;border-radius:6px;border:1px solid rgba(237,232,220,0.05);}
  .card .artist{opacity:0.6;font-size:14px;}
  .card .album{font-size:16px;font-weight:bold;}
  .login-box{background:#242019;padding:40px;border-radius:12px;max-width:400px;margin:40px auto;text-align:center;}
  .login-btn{background:#fff;color:#1a1815;border:none;padding:12px 24px;border-radius:6px;font-weight:600;cursor:pointer;font-size:16px;}
  .hidden{display:none !important;}
  .tab{display:inline-block;padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{border-bottom-color:#D6432F;}
</style>
</head>
<body>

<div id="loginScreen" class="login-box">
  <h1>Discoteca</h1>
  <button class="login-btn" id="btnLogin">Entrar com Google</button>
  <div id="loginError" style="color:#f44336;margin-top:12px;display:none;">Erro</div>
</div>

<div id="appScreen" class="hidden">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(237,232,220,0.1);">
    <span id="userName">👤 Carregando...</span>
    <button id="btnLogout" style="background:none;border:1px solid rgba(237,232,220,0.2);color:#EDE8DC;padding:4px 12px;border-radius:4px;cursor:pointer;">Sair</button>
  </div>

  <h1>Discoteca</h1>
  <p id="subTitle" style="opacity:0.5;">Sua coleção</p>

  <div style="margin:16px 0;">
    <span class="tab active" data-tab="colecao" onclick="switchTab('colecao')">💿 Coleção</span>
    <span class="tab" data-tab="compras" onclick="switchTab('compras')">📋 Compras</span>
    <span class="tab" data-tab="descobertas" onclick="switchTab('descobertas')">🔍 Descobertas</span>
  </div>

  <div id="tab-colecao" class="tab-content"></div>
  <div id="tab-compras" class="tab-content" style="display:none;"></div>
  <div id="tab-descobertas" class="tab-content" style="display:none;"></div>
</div>

<script>
// ========== CONFIG ==========
const API = 'https://fportelada.pythonanywhere.com';
let usuarioId = null;

// ========== LOGIN ==========
document.getElementById('btnLogin').addEventListener('click', function() {
  const btn = this;
  btn.disabled = true;
  fetch(API + '/login')
    .then(r => r.json())
    .then(d => {
      if (d.auth_url) window.location.href = d.auth_url;
    })
    .catch(() => {
      document.getElementById('loginError').style.display = 'block';
      btn.disabled = false;
    });
});

// ========== LOGOUT ==========
document.getElementById('btnLogout').addEventListener('click', function() {
  window.location.href = window.location.pathname;
});

// ========== VERIFICAR SESSÃO ==========
function verificarSessao() {
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('user_id');
  const nome = params.get('nome');

  if (userId && nome) {
    usuarioId = userId;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    document.getElementById('userName').textContent = '👤 ' + nome;
    carregarDados();
    return;
  }

  fetch(API + '/sessao')
    .then(r => r.json())
    .then(data => {
      if (data.logado) {
        usuarioId = data.usuario_id;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        document.getElementById('userName').textContent = '👤 ' + (data.nome || 'Usuário');
        carregarDados();
      }
    })
    .catch(() => {});
}

// ========== CARREGAR DADOS ==========
function carregarDados() {
  console.log('Carregando dados... usuarioId:', usuarioId);
  
  const urlBase = API + '?user_id=' + usuarioId;

  fetch(API + '/colecao?user_id=' + usuarioId)
    .then(r => r.json())
    .then(data => {
      console.log('Coleção recebida:', data);
      renderColecao(data);
    })
    .catch(err => console.error('Erro coleção:', err));

  fetch(API + '/recomendacoes?user_id=' + usuarioId)
    .then(r => r.json())
    .then(data => {
      console.log('Recomendações recebidas:', data);
      renderRecomendacoes(data);
    })
    .catch(err => console.error('Erro recomendações:', err));

  fetch(API + '/descobertas?user_id=' + usuarioId)
    .then(r => r.json())
    .then(data => {
      console.log('Descobertas recebidas:', data);
      renderDescobertas(data);
    })
    .catch(err => console.error('Erro descobertas:', err));
}

// ========== RENDER ==========
function renderColecao(dados) {
  const div = document.getElementById('tab-colecao');
  if (!dados || dados.length === 0) {
    div.innerHTML = '<p style="opacity:0.4;">Nenhum disco na coleção</p>';
    return;
  }
  div.innerHTML = dados.map(item => `
    <div class="card">
      <div class="album">${item.album || '?'}</div>
      <div class="artist">${item.artista}</div>
      <div style="font-size:11px;opacity:0.4;margin-top:4px;">${item.formato || '—'} | ${item.condicao_midia || ''} ${item.condicao_capa ? '/' + item.condicao_capa : ''}</div>
    </div>
  `).join('');
}

function renderRecomendacoes(dados) {
  const div = document.getElementById('tab-compras');
  if (!dados || dados.length === 0) {
    div.innerHTML = '<p style="opacity:0.4;">Nenhuma recomendação</p>';
    return;
  }
  const tiers = {S:[], A:[], B:[], C:[]};
  dados.forEach(r => { if (tiers[r.tier]) tiers[r.tier].push(r); });
  
  let html = '';
  ['S','A','B','C'].forEach(tier => {
    const items = tiers[tier] || [];
    if (items.length === 0) return;
    html += `<h3 style="color:${tier==='S'?'#D6432F':tier==='A'?'#E39A2E':tier==='B'?'#4E7A8C':'#8A8378'};">Tier ${tier}</h3>`;
    html += items.map(item => `
      <div class="card">
        <div class="album">${item.album || '?'}</div>
        <div class="artist">${item.artista}</div>
        <div style="font-size:11px;opacity:0.4;margin-top:4px;">${item.estrategia || ''}</div>
      </div>
    `).join('');
  });
  div.innerHTML = html || '<p style="opacity:0.4;">Nenhuma recomendação</p>';
}

function renderDescobertas(dados) {
  const div = document.getElementById('tab-descobertas');
  if (!dados || dados.length === 0) {
    div.innerHTML = '<p style="opacity:0.4;">Nenhuma descoberta</p>';
    return;
  }
  div.innerHTML = dados.map(item => `
    <div class="card">
      <div class="album">${item.album || '?'}</div>
      <div class="artist">${item.artista}</div>
      <div style="font-size:11px;opacity:0.4;margin-top:4px;">${item.titulo || ''} ${item.ano ? '· ' + item.ano : ''}</div>
    </div>
  `).join('');
}

// ========== TABS ==========
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
}

// ========== INICIAR ==========
document.addEventListener('DOMContentLoaded', verificarSessao);
</script>
</body>
</html>
