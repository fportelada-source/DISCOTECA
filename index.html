<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Discoteca</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#1B1815;color:#EDE8DC;font-family:Arial,sans-serif;padding:20px;}
  h1{font-size:32px;margin-bottom:4px;}
  h1 span{color:#D6432F;}
  .sub{opacity:0.5;font-size:14px;margin-bottom:20px;}
  .tabs{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap;}
  .tab{background:transparent;border:1px solid rgba(237,232,220,0.1);color:#EDE8DC;padding:8px 16px;border-radius:6px;cursor:pointer;}
  .tab.active{border-color:#D6432F;background:rgba(214,67,47,0.1);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px;}
  .card{background:#242019;border-radius:8px;padding:16px;border:1px solid rgba(237,232,220,0.05);}
  .card h3{font-size:15px;margin-bottom:2px;}
  .card .artist{font-size:13px;opacity:0.6;}
  .card .meta{font-size:11px;opacity:0.4;margin-top:8px;padding-top:8px;border-top:1px solid rgba(237,232,220,0.05);}
  .btn{background:#D6432F;color:#1B1815;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;}
  .btn:hover{opacity:0.85;}
  .btn-sm{background:#D6432F;color:#1B1815;border:none;padding:6px 14px;border-radius:4px;font-weight:600;cursor:pointer;font-size:12px;}
  .upload-area{border:2px dashed rgba(237,232,220,0.1);padding:20px;border-radius:8px;margin:12px 0;text-align:center;}
  .upload-area label{background:#D6432F;color:#1B1815;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:600;display:inline-block;margin-top:8px;}
  .upload-area input{display:none;}
  .status{font-size:12px;margin-top:6px;opacity:0.6;}
  .empty{opacity:0.4;text-align:center;padding:40px 0;grid-column:1/-1;}
  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;justify-content:center;align-items:center;}
  .modal.open{display:flex;}
  .modal-box{background:#242019;padding:32px;border-radius:12px;max-width:500px;width:90%;border:1px solid rgba(237,232,220,0.1);max-height:90vh;overflow-y:auto;}
  .modal-box h2{margin-bottom:16px;}
  .modal-box input,.modal-box select{width:100%;padding:10px;margin-bottom:12px;border-radius:6px;border:1px solid rgba(237,232,220,0.1);background:#1B1815;color:#EDE8DC;}
  .modal-box .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal-close{float:right;background:none;border:none;color:#EDE8DC;font-size:24px;cursor:pointer;opacity:0.5;}
  .tag{display:inline-block;background:#D6432F;color:#1B1815;padding:2px 10px;border-radius:4px;font-size:10px;font-weight:700;}
  .flex{display:flex;justify-content:space-between;align-items:center;}
  .mt-8{margin-top:8px;}
  .mb-8{margin-bottom:8px;}
  .badge{font-size:11px;opacity:0.4;margin-left:8px;}
  .user-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(237,232,220,0.1);margin-bottom:16px;}
  .login-box{background:#242019;padding:48px;border-radius:16px;text-align:center;max-width:400px;margin:auto;border:1px solid rgba(237,232,220,0.1);}
  .login-btn{background:#fff;color:#1a1815;border:none;padding:14px 32px;border-radius:8px;font-weight:600;font-size:16px;cursor:pointer;width:100%;}
  .login-btn:hover{opacity:0.85;}
  .hidden{display:none !important;}
  .login-container{display:flex;justify-content:center;align-items:center;min-height:70vh;}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen" class="login-container">
  <div class="login-box">
    <h1>Discoteca<span>.</span></h1>
    <p style="opacity:0.6;margin:8px 0 32px;">Sua coleção de discos, organizada.</p>
    <button class="login-btn" id="btnLogin">Entrar com Google</button>
    <div id="loginError" style="color:#f44336;font-size:13px;margin-top:12px;display:none;">Erro ao fazer login</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="appScreen" class="hidden">
  <div class="user-bar">
    <span id="userName">👤 Carregando...</span>
    <button class="btn-sm" id="btnLogout">Sair</button>
  </div>

  <h1>Discoteca<span>.</span></h1>
  <p class="sub" id="subTitle">Sua coleção de discos</p>

  <div class="tabs">
    <button class="tab active" data-tab="compras">📋 Compras</button>
    <button class="tab" data-tab="descobertas">🔍 Descobertas <span class="badge" id="descBadge">0</span></button>
    <button class="tab" data-tab="colecao">💿 Coleção <span class="badge" id="colBadge">0</span></button>
    <button class="tab" data-tab="importar">📤 Importar</button>
  </div>

  <div id="tab-compras" class="tab-content active">
    <div class="grid" id="grid-s"></div>
    <div class="grid" id="grid-a"></div>
    <div class="grid" id="grid-b"></div>
    <div class="grid" id="grid-c"></div>
  </div>

  <div id="tab-descobertas" class="tab-content">
    <div class="grid" id="grid-descobertas"></div>
  </div>

  <div id="tab-colecao" class="tab-content">
    <div class="flex mb-8">
      <p style="opacity:0.5;font-size:13px;">Discos que você já tem</p>
      <button class="btn-sm" onclick="abrirModal()">+ Adicionar</button>
    </div>
    <div class="grid" id="grid-colecao"></div>
  </div>

  <div id="tab-importar" class="tab-content">
    <div class="upload-area">
      <p><strong>🏆 Top do Ano</strong></p>
      <label for="upload-top">Escolher CSV</label>
      <input type="file" id="upload-top" accept=".csv">
      <div id="status-top" class="status"></div>
    </div>
    <div class="upload-area">
      <p><strong>🔍 Descobertas</strong></p>
      <label for="upload-desc">Escolher CSV</label>
      <input type="file" id="upload-desc" accept=".csv">
      <div id="status-desc" class="status"></div>
    </div>
    <div class="upload-area">
      <p><strong>⭐ Favoritos</strong></p>
      <label for="upload-fav">Escolher CSV</label>
      <input type="file" id="upload-fav" accept=".csv">
      <div id="status-fav" class="status"></div>
    </div>
    <div class="upload-area">
      <p><strong>💿 Discogs (Coleção)</strong></p>
      <label for="upload-discogs">Escolher CSV</label>
      <input type="file" id="upload-discogs" accept=".csv">
      <div id="status-discogs" class="status"></div>
    </div>
    <button class="btn" id="btn-gerar" style="width:100%;margin-top:8px;">⚡ Gerar Recomendações</button>
    <div id="status-gerar" class="status" style="text-align:center;margin-top:8px;"></div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal" id="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="fecharModal()">✕</button>
    <h2>➕ Adicionar Disco</h2>
    <input type="text" id="modal-artista" placeholder="Artista *">
    <input type="text" id="modal-album" placeholder="Álbum *">
    <div class="row">
      <input type="text" id="modal-formato" placeholder="Formato (LP, CD, etc)">
      <input type="text" id="modal-preco" placeholder="Preço (R$)">
    </div>
    <div class="row">
      <select id="modal-condicao-midia">
        <option value="">Condição da Mídia</option>
        <option value="M">Mint</option>
        <option value="NM">Near Mint</option>
        <option value="VG+">VG+</option>
        <option value="VG">VG</option>
        <option value="G">G</option>
        <option value="F">F</option>
        <option value="P">P</option>
      </select>
      <select id="modal-condicao-capa">
        <option value="">Condição da Capa</option>
        <option value="M">Mint</option>
        <option value="NM">Near Mint</option>
        <option value="VG+">VG+</option>
        <option value="VG">VG</option>
        <option value="G">G</option>
        <option value="F">F</option>
        <option value="P">P</option>
      </select>
    </div>
    <input type="text" id="modal-notas" placeholder="Notas (opcional)">
    <button class="btn" onclick="salvarDisco()" style="width:100%;">Salvar</button>
    <div id="modal-status" style="font-size:13px;margin-top:8px;text-align:center;"></div>
  </div>
</div>

<script>
// ========== CONFIG ==========
const API = 'https://fportelada.pythonanywhere.com';
let usuarioId = null;

// ========== LOGIN ==========
document.getElementById('btnLogin').addEventListener('click', function() {
  const btn = this;
  btn.disabled = true;
  fetch(API + '/login')
    .then(r => r.json())
    .then(d => {
      if (d.auth_url) window.location.href = d.auth_url;
    })
    .catch(() => {
      document.getElementById('loginError').style.display = 'block';
      btn.disabled = false;
    });
});

// ========== LOGOUT ==========
document.getElementById('btnLogout').addEventListener('click', function() {
  window.location.href = window.location.pathname;
});

// ========== VERIFICAR SESSÃO ==========
function verificarSessao() {
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('user_id');
  const nome = params.get('nome');

  if (userId && nome) {
    usuarioId = userId;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    document.getElementById('userName').textContent = '👤 ' + nome;
    carregarDados();
    return;
  }

  fetch(API + '/sessao')
    .then(r => r.json())
    .then(data => {
      if (data.logado) {
        usuarioId = data.usuario_id;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        document.getElementById('userName').textContent = '👤 ' + (data.nome || 'Usuário');
        carregarDados();
      }
    })
    .catch(() => {});
}

// ========== CARREGAR DADOS ==========
function carregarDados() {
  const url = (rota) => API + rota + (usuarioId ? '?user_id=' + usuarioId : '');

  fetch(url('/colecao'))
    .then(r => r.json())
    .then(data => {
      colecao = Array.isArray(data) ? data : [];
      renderColecao();
    })
    .catch(() => {});

  fetch(url('/recomendacoes'))
    .then(r => r.json())
    .then(data => {
      recomendacoes = Array.isArray(data) ? data : [];
      renderRecomendacoes();
    })
    .catch(() => {});

  fetch(url('/descobertas'))
    .then(r => r.json())
    .then(data => {
      descobertas = Array.isArray(data) ? data : [];
      renderDescobertas();
    })
    .catch(() => {});
}

// ========== DADOS ==========
let colecao = [];
let recomendacoes = [];
let descobertas = [];

// ========== RENDER ==========
function renderColecao() {
  const g = document.getElementById('grid-colecao');
  if (!g) return;
  if (!colecao || colecao.length === 0) {
    g.innerHTML = '<div class="empty">🎵 Nenhum disco na coleção</div>';
    return;
  }
  g.innerHTML = colecao.map(i => `
    <div class="card">
      <h3>${i.album || '?'}</h3>
      <div class="artist">${i.artista}</div>
      <div class="meta">${i.formato || '—'} | ${i.condicao_midia || ''} ${i.condicao_capa ? '/' + i.condicao_capa : ''}</div>
    </div>
  `).join('');
  document.getElementById('colBadge').textContent = colecao.length;
}

function renderRecomendacoes() {
  const tiers = {S:[],A:[],B:[],C:[]};
  recomendacoes.forEach(r => { if (tiers[r.tier]) tiers[r.tier].push(r); });

  ['S','A','B','C'].forEach(tier => {
    const g = document.getElementById('grid-' + tier.toLowerCase());
    if (!g) return;
    const items = tiers[tier] || [];
    if (items.length === 0) {
      g.innerHTML = '<div class="empty">Nenhuma recomendação ' + tier + '</div>';
      return;
    }
    g.innerHTML = items.map(i => `
      <div class="card">
        <h3>${i.album || 'Álbum'}</h3>
        <div class="artist">${i.artista}</div>
        <div class="meta">${i.estrategia || ''}</div>
      </div>
    `).join('');
  });
}

function renderDescobertas() {
  const g = document.getElementById('grid-descobertas');
  if (!g) return;
  if (!descobertas || descobertas.length === 0) {
    g.innerHTML = '<div class="empty">Nenhuma descoberta registrada</div>';
    return;
  }
  g.innerHTML = descobertas.map(i => `
    <div class="card">
      <h3>${i.album || 'Álbum'}</h3>
      <div class="artist">${i.artista}</div>
      <div class="meta">${i.titulo || ''} ${i.ano ? '· ' + i.ano : ''}</div>
    </div>
  `).join('');
  document.getElementById('descBadge').textContent = descobertas.length;
}

// ========== MODAL ==========
function abrirModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-status').textContent = '';
}

function fecharModal() {
  document.getElementById('modal').classList.remove('open');
}

function salvarDisco() {
  const artista = document.getElementById('modal-artista').value.trim();
  const album = document.getElementById('modal-album').value.trim();
  const status = document.getElementById('modal-status');

  if (!artista || !album) {
    status.textContent = '⚠️ Artista e álbum são obrigatórios';
    status.style.color = '#f44336';
    return;
  }

  const dados = {
    artista: artista,
    album: album,
    formato: document.getElementById('modal-formato').value,
    condicao_midia: document.getElementById('modal-condicao-midia').value,
    condicao_capa: document.getElementById('modal-condicao-capa').value,
    preco: parseFloat(document.getElementById('modal-preco').value) || null,
    notas: document.getElementById('modal-notas').value
  };

  status.textContent = '⏳ Salvando...';
  status.style.color = '';

  fetch(API + '/adicionar_disco' + (usuarioId ? '?user_id=' + usuarioId : ''), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(dados)
  })
  .then(r => r.json())
  .then(d => {
    if (d.sucesso) {
      status.textContent = '✅ ' + d.mensagem;
      status.style.color = '#4CAF50';
      setTimeout(() => {
        fecharModal();
        carregarDados();
      }, 1000);
    } else {
      status.textContent = '❌ ' + (d.erro || 'Erro');
      status.style.color = '#f44336';
    }
  })
  .catch(() => {
    status.textContent = '❌ Erro de conexão';
    status.style.color = '#f44336';
  });
}

// ========== TABS ==========
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
  });
});

// ========== UPLOADS ==========
function uploadPlaylist(tipo, input) {
  const status = document.getElementById('status-' + tipo);
  const file = input.files[0];
  if (!file) return;
  status.textContent = '⏳ Enviando...';
  const fd = new FormData();
  fd.append('tipo', tipo);
  fd.append('arquivo', file);
  fetch(API + '/importar_playlist' + (usuarioId ? '?user_id=' + usuarioId : ''), { method: 'POST', body: fd })
    .then(r => r.json())
    .then(d => {
      if (d.sucesso) {
        status.textContent = '✅ ' + d.mensagem;
        status.style.color = '#4CAF50';
      } else {
        status.textContent = '❌ ' + (d.erro || 'Erro');
        status.style.color = '#f44336';
      }
    })
    .catch(() => {
      status.textContent = '❌ Erro de conexão';
      status.style.color = '#f44336';
    });
}

function uploadDiscogs(input) {
  const status = document.getElementById('status-discogs');
  const file = input.files[0];
  if (!file) return;
  status.textContent = '⏳ Enviando...';
  const fd = new FormData();
  fd.append('arquivo', file);
  fetch(API + '/importar_colecao' + (usuarioId ? '?user_id=' + usuarioId : ''), { method: 'POST', body: fd })
    .then(r => r.json())
    .then(d => {
      if (d.sucesso) {
        status.textContent = '✅ ' + d.mensagem;
        status.style.color = '#4CAF50';
        carregarDados();
      } else {
        status.textContent = '❌ ' + (d.erro || 'Erro');
        status.style.color = '#f44336';
      }
    })
    .catch(() => {
      status.textContent = '❌ Erro de conexão';
      status.style.color = '#f44336';
    });
}

function gerarRecomendacoes() {
  const status = document.getElementById('status-gerar');
  const btn = document.getElementById('btn-gerar');
  btn.disabled = true;
  btn.textContent = '⏳ Gerando...';
  status.textContent = '⏳ Processando...';
  fetch(API + '/gerar_recomendacoes' + (usuarioId ? '?user_id=' + usuarioId : ''), { method: 'POST' })
    .then(r => r.json())
    .then(d => {
      if (d.sucesso) {
        status.textContent = '✅ ' + d.mensagem;
        status.style.color = '#4CAF50';
        carregarDados();
      } else {
        status.textContent = '❌ ' + (d.erro || 'Erro');
        status.style.color = '#f44336';
      }
    })
    .catch(() => {
      status.textContent = '❌ Erro de conexão';
      status.style.color = '#f44336';
    })
    .finally(() => {
      btn.disabled = false;
      btn.textContent = '⚡ Gerar Recomendações';
    });
}

// ========== EVENTOS ==========
document.getElementById('upload-top').addEventListener('change', function() {
  uploadPlaylist('top', this);
});
document.getElementById('upload-desc').addEventListener('change', function() {
  uploadPlaylist('descobertas', this);
});
document.getElementById('upload-fav').addEventListener('change', function() {
  uploadPlaylist('favoritos', this);
});
document.getElementById('upload-discogs').addEventListener('change', function() {
  uploadDiscogs(this);
});
document.getElementById('btn-gerar').addEventListener('click', gerarRecomendacoes);

// ========== INICIAR ==========
document.addEventListener('DOMContentLoaded', verificarSessao);
</script>
</body>
</html>
