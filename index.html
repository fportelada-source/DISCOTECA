<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discoteca</title>
<style>
  body { background:#1B1815; color:#EDE8DC; font-family:sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
  .box { background:#242019; padding:48px; border-radius:16px; text-align:center; max-width:400px; border:1px solid rgba(237,232,220,0.1); }
  h1 { font-size:48px; margin-bottom:8px; }
  h1 span { color:#D6432F; }
  p { opacity:0.6; margin-bottom:32px; }
  button { background:#fff; color:#1a1815; border:none; padding:14px 32px; border-radius:8px; font-weight:600; font-size:16px; cursor:pointer; width:100%; }
  button:hover { opacity:0.85; }
  .hidden { display:none !important; }
  .tabs { display:flex; gap:8px; margin:20px 0; flex-wrap:wrap; justify-content:center; }
  .tab { background:transparent; border:1px solid rgba(237,232,220,0.1); color:#EDE8DC; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:12px; }
  .tab.active { border-color:#D6432F; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-top:16px; }
  .card { background:#242019; border-radius:8px; padding:12px; border:1px solid rgba(237,232,220,0.05); text-align:left; }
  .card h4 { margin:0 0 4px; font-size:14px; }
  .card .artist { font-size:12px; opacity:0.6; }
  .card .meta { font-size:11px; opacity:0.4; margin-top:8px; border-top:1px solid rgba(237,232,220,0.05); padding-top:8px; }
  .upload-area { border:2px dashed rgba(237,232,220,0.1); padding:24px; border-radius:8px; margin:12px 0; text-align:center; }
  .upload-area label { background:#D6432F; color:#1a1815; padding:8px 16px; border-radius:4px; cursor:pointer; font-weight:600; display:inline-block; margin-top:8px; }
  .upload-area input { display:none; }
  .status { font-size:12px; margin-top:8px; opacity:0.6; }
  .btn { background:#D6432F; color:#1a1815; border:none; padding:10px 20px; border-radius:6px; font-weight:600; cursor:pointer; margin-top:12px; }
  .user { font-size:12px; opacity:0.4; margin-bottom:12px; }
  #loginError { color:#f44336; font-size:13px; margin-top:12px; display:none; }
  .loading { opacity:0.5; pointer-events:none; }
</style>
</head>
<body>

<div id="loginScreen" class="box">
  <h1>Discoteca<span>.</span></h1>
  <p>Sua coleção de discos, organizada.</p>
  <button id="btnLogin">Entrar com Google</button>
  <div id="loginError">Erro ao fazer login. Tente novamente.</div>
</div>

<div id="appScreen" class="box hidden">
  <div class="user" id="userInfo"></div>
  <h1>Discoteca<span>.</span></h1>
  <div class="tabs">
    <button class="tab active" data-tab="compras">📋 Compras</button>
    <button class="tab" data-tab="descobertas">🔍 Descobertas</button>
    <button class="tab" data-tab="colecao">💿 Coleção</button>
    <button class="tab" data-tab="importar">📤 Importar</button>
  </div>

  <div id="tab-compras">
    <div class="grid" id="grid-s"></div>
    <div class="grid" id="grid-a"></div>
    <div class="grid" id="grid-b"></div>
    <div class="grid" id="grid-c"></div>
  </div>

  <div id="tab-descobertas" class="hidden">
    <div class="grid" id="grid-descobertas"></div>
  </div>

  <div id="tab-colecao" class="hidden">
    <div class="grid" id="grid-colecao"></div>
  </div>

  <div id="tab-importar" class="hidden">
    <div class="upload-area">
      <p><strong>🏆 Top do Ano</strong></p>
      <label for="upload-top">Escolher CSV</label>
      <input type="file" id="upload-top" accept=".csv">
      <div id="status-top" class="status"></div>
    </div>
    <div class="upload-area">
      <p><strong>🔍 Descobertas</strong></p>
      <label for="upload-desc">Escolher CSV</label>
      <input type="file" id="upload-desc" accept=".csv">
      <div id="status-desc" class="status"></div>
    </div>
    <div class="upload-area">
      <p><strong>⭐ Favoritos</strong></p>
      <label for="upload-fav">Escolher CSV</label>
      <input type="file" id="upload-fav" accept=".csv">
      <div id="status-fav" class="status"></div>
    </div>
    <div class="upload-area">
      <p><strong>💿 Discogs (Coleção)</strong></p>
      <label for="upload-discogs">Escolher CSV</label>
      <input type="file" id="upload-discogs" accept=".csv">
      <div id="status-discogs" class="status"></div>
    </div>
    <button class="btn" id="btn-gerar">⚡ Gerar Recomendações</button>
    <div id="status-gerar" class="status"></div>
  </div>
</div>

<script>
(function() {
  const API = 'https://fportelada.pythonanywhere.com';

  // ========== ELEMENTOS ==========
  const loginScreen = document.getElementById('loginScreen');
  const appScreen = document.getElementById('appScreen');
  const btnLogin = document.getElementById('btnLogin');
  const loginError = document.getElementById('loginError');
  const userInfo = document.getElementById('userInfo');

  // ========== LOGIN ==========
  btnLogin.addEventListener('click', function() {
    const btn = this;
    btn.disabled = true;
    btn.textContent = '⏳ Carregando...';
    loginError.style.display = 'none';

    fetch(API + '/login')
      .then(r => r.json())
      .then(data => {
        if (data.auth_url) {
          window.location.href = data.auth_url;
        } else {
          throw new Error('URL não recebida');
        }
      })
      .catch(() => {
        loginError.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar com Google';
      });
  });

  // ========== VERIFICAR SESSÃO ==========
  function verificarSessao() {
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('user_id');
    const nome = params.get('nome');

    if (userId && nome) {
      loginScreen.classList.add('hidden');
      appScreen.classList.remove('hidden');
      userInfo.textContent = '👤 ' + nome;
      window.history.replaceState({}, document.title, window.location.pathname);
      carregarDados();
      return;
    }

    fetch(API + '/sessao')
      .then(r => r.json())
      .then(data => {
        if (data.logado) {
          loginScreen.classList.add('hidden');
          appScreen.classList.remove('hidden');
          userInfo.textContent = '👤 ' + (data.nome || '');
          carregarDados();
        }
      })
      .catch(() => {
        // Se a API estiver fora, mostra login mesmo assim
      });
  }

  // ========== CARREGAR DADOS ==========
  function carregarDados() {
    fetch(API + '/colecao')
      .then(r => r.json())
      .then(data => {
        colecao = Array.isArray(data) ? data : [];
        renderColecao();
      })
      .catch(() => {});

    fetch(API + '/recomendacoes')
      .then(r => r.json())
      .then(data => {
        recomendacoes = Array.isArray(data) ? data : [];
        renderRecomendacoes();
      })
      .catch(() => {});

    fetch(API + '/descobertas')
      .then(r => r.json())
      .then(data => {
        descobertas = Array.isArray(data) ? data : [];
        renderDescobertas();
      })
      .catch(() => {});
  }

  // ========== VARIÁVEIS ==========
  let colecao = [];
  let recomendacoes = [];
  let descobertas = [];

  // ========== RENDERIZAR ==========
  function renderColecao() {
    const g = document.getElementById('grid-colecao');
    if (!g) return;
    if (colecao.length === 0) {
      g.innerHTML = '<p style="opacity:0.4;grid-column:1/-1;text-align:center;">Nenhum disco</p>';
      return;
    }
    g.innerHTML = colecao.map(i => `
      <div class="card">
        <h4>${i.album || '?'}</h4>
        <div class="artist">${i.artista}</div>
        <div class="meta">${i.formato || '—'} | ${i.condicao_midia || ''} ${i.condicao_capa ? '/' + i.condicao_capa : ''}</div>
      </div>
    `).join('');
  }

  function renderRecomendacoes() {
    const tiers = { S: [], A: [], B: [], C: [] };
    recomendacoes.forEach(r => { if (tiers[r.tier]) tiers[r.tier].push(r); });

    ['S', 'A', 'B', 'C'].forEach(t => {
      const g = document.getElementById('grid-' + t.toLowerCase());
      if (!g) return;
      const items = tiers[t] || [];
      if (items.length === 0) {
        g.innerHTML = '<p style="opacity:0.4;grid-column:1/-1;text-align:center;">Nenhuma recomendação</p>';
        return;
      }
      g.innerHTML = items.map(i => `
        <div class="card">
          <h4>${i.album || '?'}</h4>
          <div class="artist">${i.artista}</div>
          <div class="meta">${i.estrategia || ''}</div>
        </div>
      `).join('');
    });
  }

  function renderDescobertas() {
    const g = document.getElementById('grid-descobertas');
    if (!g) return;
    if (descobertas.length === 0) {
      g.innerHTML = '<p style="opacity:0.4;grid-column:1/-1;text-align:center;">Nenhuma descoberta</p>';
      return;
    }
    g.innerHTML = descobertas.map(i => `
      <div class="card">
        <h4>${i.album || '?'}</h4>
        <div class="artist">${i.artista}</div>
        <div class="meta">${i.titulo || ''}</div>
      </div>
    `).join('');
  }

  // ========== UPLOAD PLAYLIST ==========
  function uploadPlaylist(tipo, input) {
    const status = document.getElementById('status-' + tipo);
    const file = input.files[0];
    if (!file) return;

    status.textContent = '⏳ Enviando...';
    status.style.color = '';

    const fd = new FormData();
    fd.append('tipo', tipo);
    fd.append('arquivo', file);

    fetch(API + '/importar_playlist', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(d => {
        if (d.sucesso) {
          status.textContent = '✅ ' + d.mensagem;
          status.style.color = '#4CAF50';
        } else {
          status.textContent = '❌ ' + (d.erro || 'Erro');
          status.style.color = '#f44336';
        }
      })
      .catch(() => {
        status.textContent = '❌ Erro de conexão';
        status.style.color = '#f44336';
      });
  }

  // ========== UPLOAD DISCOGS ==========
  function uploadDiscogs(input) {
    const status = document.getElementById('status-discogs');
    const file = input.files[0];
    if (!file) return;

    status.textContent = '⏳ Enviando...';
    status.style.color = '';

    const fd = new FormData();
    fd.append('arquivo', file);

    fetch(API + '/importar_colecao', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(d => {
        if (d.sucesso) {
          status.textContent = '✅ ' + d.mensagem;
          status.style.color = '#4CAF50';
          carregarDados();
        } else {
          status.textContent = '❌ ' + (d.erro || 'Erro');
          status.style.color = '#f44336';
        }
      })
      .catch(() => {
        status.textContent = '❌ Erro de conexão';
        status.style.color = '#f44336';
      });
  }

  // ========== GERAR RECOMENDAÇÕES ==========
  function gerarRecomendacoes() {
    const status = document.getElementById('status-gerar');
    const btn = document.getElementById('btn-gerar');

    btn.disabled = true;
    btn.textContent = '⏳ Gerando...';
    status.textContent = '⏳ Processando...';
    status.style.color = '';

    fetch(API + '/gerar_recomendacoes', { method: 'POST' })
      .then(r => r.json())
      .then(d => {
        if (d.sucesso) {
          status.textContent = '✅ ' + d.mensagem;
          status.style.color = '#4CAF50';
          carregarDados();
        } else {
          status.textContent = '❌ ' + (d.erro || 'Erro');
          status.style.color = '#f44336';
        }
      })
      .catch(() => {
        status.textContent = '❌ Erro de conexão';
        status.style.color = '#f44336';
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = '⚡ Gerar Recomendações';
      });
  }

  // ========== TABS ==========
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');

    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
    document.getElementById('tab-' + tab).classList.remove('hidden');
  }

  // ========== EVENTOS ==========
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() {
      switchTab(this.dataset.tab);
    });
  });

  document.getElementById('upload-top').addEventListener('change', function() {
    uploadPlaylist('top', this);
  });
  document.getElementById('upload-desc').addEventListener('change', function() {
    uploadPlaylist('descobertas', this);
  });
  document.getElementById('upload-fav').addEventListener('change', function() {
    uploadPlaylist('favoritos', this);
  });
  document.getElementById('upload-discogs').addEventListener('change', function() {
    uploadDiscogs(this);
  });
  document.getElementById('btn-gerar').addEventListener('click', gerarRecomendacoes);

  // ========== INICIAR ==========
  document.addEventListener('DOMContentLoaded', verificarSessao);
})();
</script>
</body>
</html>
