<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discoteca</title>
<style>
  body{background:#1B1815;color:#EDE8DC;font-family:sans-serif;padding:20px;}
  .card{background:#242019;padding:16px;margin:12px 0;border-radius:8px;border:1px solid rgba(237,232,220,0.05);}
  .card h3{margin:0;font-size:16px;}
  .card .artist{font-size:14px;opacity:0.6;margin-top:4px;}
  .card .meta{font-size:12px;opacity:0.4;margin-top:6px;border-top:1px solid rgba(237,232,220,0.05);padding-top:6px;}
  .login-box{background:#242019;padding:40px;border-radius:12px;max-width:400px;margin:40px auto;text-align:center;}
  .login-btn{background:#fff;color:#1a1815;border:none;padding:12px 24px;border-radius:6px;font-weight:600;cursor:pointer;font-size:16px;}
  .hidden{display:none !important;}
  .tab{display:inline-block;padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-right:4px;}
  .tab.active{border-bottom-color:#D6432F;}
  .tabs{margin:16px 0;}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  .empty{opacity:0.4;padding:20px 0;text-align:center;}
  .user-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(237,232,220,0.1);margin-bottom:16px;}
</style>
</head>
<body>

<div id="loginScreen" class="login-box">
  <h1>Discoteca</h1>
  <button class="login-btn" id="btnLogin">Entrar com Google</button>
  <div id="loginError" style="color:#f44336;margin-top:12px;display:none;">Erro</div>
</div>

<div id="appScreen" class="hidden">
  <div class="user-bar">
    <span id="userName">👤 Carregando...</span>
    <button id="btnLogout" style="background:none;border:1px solid rgba(237,232,220,0.2);color:#EDE8DC;padding:4px 12px;border-radius:4px;cursor:pointer;">Sair</button>
  </div>

  <h1>Discoteca</h1>
  <p id="subTitle" style="opacity:0.5;">Sua coleção</p>

  <div class="tabs">
    <span class="tab active" data-tab="colecao" onclick="switchTab('colecao')">💿 Coleção</span>
    <span class="tab" data-tab="compras" onclick="switchTab('compras')">📋 Compras</span>
    <span class="tab" data-tab="descobertas" onclick="switchTab('descobertas')">🔍 Descobertas</span>
  </div>

  <div id="tab-colecao" class="tab-content active"></div>
  <div id="tab-compras" class="tab-content"></div>
  <div id="tab-descobertas" class="tab-content"></div>
</div>

<script>
const API = 'https://fportelada.pythonanywhere.com';
let usuarioId = null;
let colecao = [];
let recomendacoes = [];
let descobertas = [];

document.getElementById('btnLogin').addEventListener('click', function() {
  fetch(API + '/login')
    .then(r => r.json())
    .then(d => { if (d.auth_url) window.location.href = d.auth_url; })
    .catch(() => document.getElementById('loginError').style.display = 'block');
});

document.getElementById('btnLogout').addEventListener('click', function() {
  window.location.href = window.location.pathname;
});

function verificarSessao() {
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('user_id');
  const nome = params.get('nome');

  if (userId && nome) {
    usuarioId = userId;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    document.getElementById('userName').textContent = '👤 ' + nome;
    carregarDados();
    window.history.replaceState({}, document.title, window.location.pathname);
    return;
  }

  fetch(API + '/sessao')
    .then(r => r.json())
    .then(data => {
      if (data.logado) {
        usuarioId = data.usuario_id;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        document.getElementById('userName').textContent = '👤 ' + (data.nome || 'Usuário');
        carregarDados();
      }
    })
    .catch(() => {});
}

function carregarDados() {
  fetch(API + '/colecao?user_id=' + usuarioId)
    .then(r => r.json())
    .then(data => {
      colecao = Array.isArray(data) ? data : [];
      renderColecao();
    })
    .catch(() => {});

  fetch(API + '/recomendacoes?user_id=' + usuarioId)
    .then(r => r.json())
    .then(data => {
      recomendacoes = Array.isArray(data) ? data : [];
      renderRecomendacoes();
    })
    .catch(() => {});

  fetch(API + '/descobertas?user_id=' + usuarioId)
    .then(r => r.json())
    .then(data => {
      descobertas = Array.isArray(data) ? data : [];
      renderDescobertas();
    })
    .catch(() => {});
}

function renderColecao() {
  const div = document.getElementById('tab-colecao');
  if (!colecao || colecao.length === 0) {
    div.innerHTML = '<div class="empty">Nenhum disco na coleção</div>';
    return;
  }
  div.innerHTML = colecao.map(item => `
    <div class="card">
      <h3>${item.album || '?'}</h3>
      <div class="artist">${item.artista || 'Artista'}</div>
      <div class="meta">${item.formato || '—'} | ${item.condicao_midia || ''} ${item.condicao_capa ? '/' + item.condicao_capa : ''}</div>
    </div>
  `).join('');
}

function renderRecomendacoes() {
  const div = document.getElementById('tab-compras');
  if (!recomendacoes || recomendacoes.length === 0) {
    div.innerHTML = '<div class="empty">Nenhuma recomendação</div>';
    return;
  }
  const tiers = {S:[],A:[],B:[],C:[]};
  recomendacoes.forEach(r => { if (tiers[r.tier]) tiers[r.tier].push(r); });
  
  let html = '';
  ['S','A','B','C'].forEach(tier => {
    const items = tiers[tier] || [];
    if (items.length === 0) return;
    const color = tier === 'S' ? '#D6432F' : tier === 'A' ? '#E39A2E' : tier === 'B' ? '#4E7A8C' : '#8A8378';
    html += `<h3 style="color:${color};">Tier ${tier}</h3>`;
    html += items.map(item => `
      <div class="card">
        <h3>${item.album || '?'}</h3>
        <div class="artist">${item.artista || 'Artista'}</div>
        <div class="meta">${item.estrategia || ''}</div>
      </div>
    `).join('');
  });
  div.innerHTML = html || '<div class="empty">Nenhuma recomendação</div>';
}

function renderDescobertas() {
  const div = document.getElementById('tab-descobertas');
  if (!descobertas || descobertas.length === 0) {
    div.innerHTML = '<div class="empty">Nenhuma descoberta</div>';
    return;
  }
  div.innerHTML = descobertas.map(item => `
    <div class="card">
      <h3>${item.album || '?'}</h3>
      <div class="artist">${item.artista || 'Artista'}</div>
      <div class="meta">${item.titulo || ''} ${item.ano ? '· ' + item.ano : ''}</div>
    </div>
  `).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
}

document.addEventListener('DOMContentLoaded', verificarSessao);
</script>
</body>
</html>
